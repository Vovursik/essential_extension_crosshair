<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<style>

html,
body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ПРИЦЕЛ */

#crosshair {
    position: relative;
    width: 40px;
    height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 1;
    
    /* Быстрое появление (по умолчанию) */
    transition: opacity 0.2s cubic-bezier(0.075, 0.82, 0.165, 1);
}

/* Класс для скрытого состояния — медленное исчезание */
#crosshair.hidden {
    opacity: 0;
    
    /* Медленное исчезание */
    transition: opacity 1.4s cubic-bezier(0.075, 0.82, 0.165, 1);
}

/* Центральная точка */
.dot {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: red;
}

/* Круг */
.circle {
    position: absolute;
    width: 25px;
    height: 25px;
    border-radius: 50%;
    border: 1.5px solid red;
}

</style>
</head>

<body>

<div id="crosshair">
    <div class="circle"></div>
    <div class="dot"></div>
</div>

<script>
const { ipcRenderer } = require('electron');
const crosshair = document.getElementById('crosshair');

// Слушаем состояние ПКМ
ipcRenderer.on('mouse-state', (event, pressed) => {

    // Нажата ПКМ -> добавляем класс hidden (медленное исчезание)
    if (pressed) {
        crosshair.classList.add('hidden');
    } else {
        // Отпущена -> убираем класс hidden (быстрое появление)
        crosshair.classList.remove('hidden');
    }
});
</script>

</body>
</html>
